<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minishop - ระบบสั่งอาหารออนไลน์</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- LINE Font & Icons Options -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .category-btn {
      border-radius: 20px;
      transition: all 0.2s;
    }

    .product-card {
      border: none;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      transition: transform 0.2s;
    }

    .product-card:hover {
      transform: translateY(-3px);
    }

    .product-img {
      height: 140px;
      object-fit: cover;
      background-color: #e9ecef;
    }

    .product-img-horizontal {
      height: 100px;
      object-fit: cover;
      width: 100%;
      background-color: #e9ecef;
    }

    .cart-badge {
      position: absolute;
      top: -5px;
      right: -5px;
    }

    .sticky-cart-bar {
      position: sticky;
      bottom: 0;
      background: white;
      box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.1);
      z-index: 1030;
    }

    .profile-img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: 2px solid #28a745;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.8);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
  </style>
</head>

<body>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-border text-success" role="status"></div>
    <span class="mt-2 fw-bold text-secondary">กำลังบันทึกข้อมูล กรุณารอสักครู่...</span>
  </div>

  <!-- Header & Profile -->
  <div class="bg-white p-3 shadow-sm border-bottom">
    <div class="container d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center">
        <img id="userPicture" src="https://via.placeholder.com/45" alt="Profile" class="profile-img me-2">
        <div>
          <small class="text-muted d-block">ยินดีต้อนรับคุณ</small>
          <strong id="userName" class="text-dark">Loading LINE Profile...</strong>
        </div>
      </div>
      <span class="badge bg-success fs-6"><i class="bi bi-shop"></i> ร้านพีแก๊ส</span>
    </div>
  </div>

  <div class="container py-3 mb-5">
    <!-- Category Filter Bar -->
    <div class="d-flex gap-2 overflow-x-auto pb-3" id="categoryContainer">
      <!-- ปุ่มหมวดหมู่จะถูกสร้างอัตโนมัติจากข้อมูลใน Google Sheet -->
    </div>

    <!-- Product Grid -->
    <h5 class="fw-bold mb-3 text-secondary" id="currentCategoryTitle">รายการสินค้าทั้งหมด</h5>
    <div class="row g-3" id="productGrid">
      <!-- ข้อมูลเมนูอาหารจะโหลดจาก Open Sheet มาใส่ตรงนี้แบบ Dynamic -->
      <div class="col-12 text-center py-5">
        <div class="spinner-border text-success" role="status"></div>
        <p class="mt-2 text-muted">กำลังโหลดรายการสินค้า...</p>
      </div>
    </div>
  </div>

  <!-- Sticky Cart Bar (โผล่เมื่อมีการสั่งอาหาร) -->
  <div class="sticky-cart-bar p-3 border-top bg-white border-top border-2" id="cartBar" style="display: none;">
    <div class="container d-flex align-items-center justify-content-between">
      <div>
        <span class="text-muted small">รวมทั้งสิ้น</span>
        <h4 class="fw-bold text-success mb-0" id="cartTotalSummary">0 บาท</h4>
      </div>
      <button class="btn btn-success btn-lg px-4 shadow" data-bs-toggle="modal" data-bs-target="#checkoutModal" onclick="renderCheckoutList()">
        <i class="bi bi-credit-card-2-front"></i> ชำระเงิน
      </button>
    </div>
  </div>

  <!-- Checkout & Payment Modal -->
  <div class="modal fade" id="checkoutModal" tabindex="-1" aria-labelledby="checkoutModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable modal-fullscreen-sm-down">
      <div class="modal-content">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title" id="checkoutModalLabel"><i class="bi bi-cart-check"></i> ยืนยันการสั่งซื้อและชำระเงิน</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <!-- สรุปรายการในตะกร้า -->
          <h6 class="fw-bold text-secondary mb-3">รายการสินค้าที่สั่งซื้อ</h6>
          <ul class="list-group list-group-flush mb-4" id="checkoutItemsList"></ul>

          <div class="d-flex justify-content-between align-items-center bg-light p-3 rounded mb-4">
            <span class="fw-bold">ยอดเงินสุทธิที่ต้องโอน:</span>
            <h3 class="text-success fw-bold mb-0" id="modalCartTotal">0 บาท</h3>
          </div>

          <!-- ฟอร์มข้อมูลจัดส่ง -->
          <h6 class="fw-bold text-secondary mb-3">ข้อมูลสำหรับจัดส่ง</h6>
          <form id="orderForm">
            <div class="mb-3">
              <label class="form-label small fw-bold">ชื่อผู้รับ</label>
              <input type="text" class="form-control" id="formName" required placeholder="กรุณากรอกชื่อผู้รับ">
            </div>
            <div class="mb-3">
              <label class="form-label small fw-bold">เบอร์โทรศัพท์ติดต่อ</label>
              <input type="tel" class="form-control" id="formTelephone" required placeholder="เช่น 0812345678">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
          <button type="button" class="btn btn-success px-4" onclick="submitOrder()">ส่งรายการสั่งซื้อ</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ================= CONFIGURATION =================
    const LIFF_ID = "2010571291-GEEyPihZ"; 
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxobrJ-ZAw8FDzDOQde2HlapZ7fyAwNqrV7aXqJPN3fBvvExG3988lv3Favb0fnklKu/exec"; 
    const OPEN_SHEET_URL = "https://opensheet.elk.sh/1fxZ0mnfOiWNMuWtpRzS7LMTeuvmzENK9xMidVBh7pUY/products"; 

    // ================= STATE MANAGEMENT =================
    let allProducts = [];
    let cart = {};
    let lineUserUid = "";
    let base64ImageStr = "";

    // ================= INITIALIZATION =================
    window.addEventListener('DOMContentLoaded', () => {
      initLiff();
      loadProducts();
    });

    // เริ่มการเชื่อมต่อ LINE LIFF
    function initLiff() {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (!liff.isLoggedIn()) {
            liff.login();
          } else {
            liff.getProfile()
              .then(profile => {
                lineUserUid = profile.userId;
                document.getElementById("userName").innerText = profile.displayName;
                document.getElementById("formName").value = profile.displayName;
                if (profile.pictureUrl) {
                  document.getElementById("userPicture").src = profile.pictureUrl;
                }
              })
              .catch(err => console.error("Error getting profile:", err));
          }
        })
        .catch(err => console.error("LIFF Initialization failed", err));
    }

    // โหลดข้อมูลอาหารจากฐานข้อมูล Google Sheet ผ่าน Open Sheet API
    function loadProducts() {
      fetch(OPEN_SHEET_URL)
        .then(res => res.json())
        .then(data => {
          allProducts = data;
          renderCategoryButtons();
          renderProducts(allProducts);
        })
        .catch(err => {
          console.error("Error loading products:", err);
          document.getElementById("productGrid").innerHTML = '<div class="col-12 text-center text-danger">เกิดข้อผิดพลาดในการโหลดข้อมูลรายการสินค้า</div>';
        });
    }

    // ================= RENDER FUNCTIONS =================
    function renderProducts(products) {
      const grid = document.getElementById("productGrid");
      grid.innerHTML = "";

      if (products.length === 0) {
        grid.innerHTML = '<div class="col-12 text-center text-muted py-5">ไม่มีรายการสินค้าในหมวดหมู่นี้</div>';
        return;
      }

      products.forEach(item => {
        const itemName = item["Item Name"] || item["ชื่อสินค้า"];
        const price = parseInt(item["Price"] || item["ราคา"]);
        const imgUrl = item["Image URL"] || item["รูปภาพ"];

        const cardHtml = `
          <div class="col-12">
            <div class="card product-card">
              <div class="row g-0 align-items-center">
                <div class="col-4">
                  <img src="${imgUrl}" class="img-fluid rounded-start product-img-horizontal" alt="${itemName}">
                </div>
                <div class="col-8">
                  <div class="card-body p-2 d-flex flex-column justify-content-between h-100">
                    <div>
                      <h6 class="card-title fw-bold text-dark mb-1">${itemName}</h6>
                      <p class="text-success fw-bold mb-2 small">${price} บาท</p>
                    </div>
                    <button class="btn btn-sm btn-success w-100 rounded-pill" onclick="addToCart('${itemName}', ${price})">
                      <i class="bi bi-plus-circle"></i> สั่งซื้อ
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
        grid.insertAdjacentHTML('beforeend', cardHtml);
      });
    }

    function renderCategoryButtons() {
      const container = document.getElementById("categoryContainer");
      container.innerHTML = "";

      const allBtn = document.createElement("button");
      allBtn.className = "btn btn-success category-btn flex-shrink-0";
      allBtn.textContent = "ทั้งหมด";
      allBtn.onclick = function () { filterCategory('All', this); };
      container.appendChild(allBtn);

      const seen = new Map();
      allProducts.forEach(item => {
        const raw = item["Category"] || item["หมวดหมู่"];
        if (!raw) return;
        const key = String(raw).trim().toLowerCase();
        if (!key) return;
        if (!seen.has(key)) {
          seen.set(key, String(raw).trim());
        }
      });

      const categories = Array.from(seen.values()).sort((a, b) => a.localeCompare(b, "th"));

      categories.forEach(label => {
        const btn = document.createElement("button");
        btn.className = "btn btn-outline-success category-btn flex-shrink-0";
        btn.textContent = label;
        btn.dataset.category = label;
        btn.onclick = function () { filterCategory(label, this); };
        container.appendChild(btn);
      });
    }

    function filterCategory(categoryName, clickedBtn) {
      const buttons = document.querySelectorAll('#categoryContainer button');
      buttons.forEach(btn => btn.classList.replace('btn-success', 'btn-outline-success'));

      if (clickedBtn) clickedBtn.classList.replace('btn-outline-success', 'btn-success');

      if (categoryName === 'All') {
        document.getElementById("currentCategoryTitle").innerText = "รายการสินค้าทั้งหมด";
        renderProducts(allProducts);
      } else {
        document.getElementById("currentCategoryTitle").innerText = `หมวดหมู่: ${categoryName}`;
        const target = String(categoryName).trim().toLowerCase();
        const filtered = allProducts.filter(p => {
          const cat = String(p["Category"] || p["หมวดหมู่"] || "").trim().toLowerCase();
          return cat === target;
        });
        renderProducts(filtered);
      }
    }

    // ================= CART SYSTEM (VANILLA JS) =================
    function addToCart(name, price) {
      if (cart[name]) {
        cart[name].quantity += 1;
      } else {
        cart[name] = { name: name, price: price, quantity: 1 };
      }
      updateCartBar();
    }

    function changeQuantity(name, amount) {
      if (cart[name]) {
        cart[name].quantity += amount;
        if (cart[name].quantity <= 0) {
          delete cart[name];
        }
        updateCartBar();
        renderCheckoutList();
      }
    }

    function updateCartBar() {
      const cartBar = document.getElementById("cartBar");
      let total = 0;
      let hasItems = false;

      for (let key in cart) {
        total += cart[key].price * cart[key].quantity;
        hasItems = true;
      }

      document.getElementById("cartTotalSummary").innerText = `${total} บาท`;
      document.getElementById("modalCartTotal").innerText = `${total} บาท`;

      if (hasItems) {
        cartBar.style.display = "block";
      } else {
        cartBar.style.display = "none";
        const modalEl = document.getElementById('checkoutModal');
        const modalObj = bootstrap.Modal.getInstance(modalEl);
        if (modalObj) modalObj.hide();
      }
    }

    function renderCheckoutList() {
      const listContainer = document.getElementById("checkoutItemsList");
      listContainer.innerHTML = "";

      for (let key in cart) {
        const item = cart[key];
        const itemTotal = item.price * item.quantity;
        const row = `
          <li class="list-group-item d-flex justify-content-between align-items-center px-0">
            <div>
              <span class="fw-bold text-dark d-block">${item.name}</span>
              <small class="text-muted">${item.price} บาท x ${item.quantity}</small>
            </div>
            <div class="d-flex align-items-center gap-2">
              <span class="fw-bold text-success me-2">${itemTotal} บาท</span>
              <div class="btn-group btn-group-sm">
                <button type="button" class="btn btn-outline-secondary" onclick="changeQuantity('${item.name}', -1)">-</button>
                <button type="button" class="btn btn-light" disabled>${item.quantity}</button>
                <button type="button" class="btn btn-outline-secondary" onclick="changeQuantity('${item.name}', 1)">+</button>
              </div>
            </div>
          </li>
        `;
        listContainer.insertAdjacentHTML('beforeend', row);
      }
    }

    // ยิง API โพสต์ข้อมูลทั้งหมดส่งไปยัง Google Apps Script หลังบ้าน
    function submitOrder() {
      const name = document.getElementById("formName").value.trim();
      const tel = document.getElementById("formTelephone").value.trim();

      if (!name || !tel) {
        alert("กรุณากรอกชื่อและเบอร์โทรศัพท์");
        return;
      }

      const modalObj = bootstrap.Modal.getInstance(document.getElementById('checkoutModal'));
      if (modalObj) modalObj.hide();
      document.getElementById("loadingOverlay").style.display = "flex";

      const orderDetailsArray = [];
      for (let key in cart) {
        orderDetailsArray.push({
          name: cart[key].name,
          price: cart[key].price,
          quantity: cart[key].quantity
        });
      }

      const payload = {
        lineUid: lineUserUid,
        name: name,
        telephone: tel,
        orderDetails: orderDetailsArray
      };

      fetch(APP_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      })
        .then(res => res.json())
        .then(result => {
          document.getElementById("loadingOverlay").style.display = "none";
          if (result.status === "success") {
            
            // [แก้ไขลอจิก] ตรวจสอบสิทธิ์ LINE และสร้างข้อความสรุปก่อนที่จะเคลียร์ค่าตัวแปรในตะกร้า (cart)
            if (liff.isApiAvailable('shareTargetPicker') || liff.isInClient()) {

              let orderSummaryText = `🛒 มีรายการสั่งซื้อใหม่เข้ามาครับ!\n`;
              orderSummaryText += `👤 คุณ: ${name}\n`;
              orderSummaryText += `📞 เบอร์โทร: ${tel}\n`;
              orderSummaryText += `------------------------\n`;

              for (let key in cart) {
                orderSummaryText += `- ${cart[key].name} (${cart[key].price}บาท) x ${cart[key].quantity}\n`;
              }
              orderSummaryText += `------------------------\n`;
              orderSummaryText += `💰 ยอดรวมทั้งสิ้น: ${document.getElementById("cartTotalSummary").innerText}`;

              liff.sendMessages([
                {
                  type: 'text',
                  text: orderSummaryText
                }
              ])
                .then(() => {
                  console.log("ส่งข้อความเข้าแชทไลน์สำเร็จ");
                  // ย้ายการเคลียร์ตระกร้าและปิดหน้าต่างมาไว้ตรงนี้ เพื่อป้องกันข้อมูลว่าง
                  clearCartAndForm();
                  liff.closeWindow();
                })
                .catch((err) => {
                  console.error("เกิดข้อผิดพลาดในการส่งข้อความ:", err);
                  alert("บันทึกออเดอร์แล้ว แต่ไม่สามารถส่งข้อความเข้าแชทได้");
                  clearCartAndForm();
                  liff.closeWindow();
                });

            } else {
              alert("สั่งซื้อสำเร็จ! บันทึกข้อมูลเข้าฐานข้อมูลเรียบร้อยแล้ว");
              clearCartAndForm();
              liff.closeWindow();
            }
          } else {
            alert("เกิดข้อผิดพลาดจากเซิร์ฟเวอร์: " + result.message);
          }
        })
        .catch(error => {
          document.getElementById("loadingOverlay").style.display = "none";
          console.error("Error submitting order:", error);
          alert("ระบบขัดข้องไม่สามารถติดต่อฐานข้อมูล Google Sheet ได้");
        });
    }

    // ฟังก์ชันเสริมสำหรับล้างข้อมูลตะกร้าหน้าเว็บหลังทำรายการเสร็จ
    function clearCartAndForm() {
      cart = {};
      base64ImageStr = "";
      document.getElementById("orderForm").reset();
      updateCartBar();
    }
  </script>
</body>

</html>
